<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça login | ZN Dental</title>
    <link rel="stylesheet" href="estilos/style-form.css">
    <link rel="stylesheet" href="estilos/form-media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações do seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <label for="ilogin"></label>
                        <input type="email" name="login" id="ilogin" maxlength="30" placeholder="seu e-mail"
                        autocomplete="email" required>
                    </div>
                    <div class="campo">
                        <span class="material-symbols-outlined">key</span>
                        <label for="isenha"></label>
                        <input type="password" name="senha" id="isenha" minlength="8" maxlength="20" placeholder="sua senha"
                        autocomplete="current-password" required>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="#">Esqueci minha senha<span class="material-symbols-outlined">mail</span></a>
                </form>
            </div>
        </section>
        <img id="logo_form" src="imagens/logo-zn.png" alt="">
    </main>
</body>

</html>
